# Sensei reverse proxy (Nginx). Terminates TLS and forwards to the local Sensei
# backend on 127.0.0.1:7000. Streaming endpoints (SSE / gateway / WebSocket)
# MUST have buffering off so tokens flush immediately.

upstream sensei {
    server 127.0.0.1:7000;
    keepalive 32;
}

server {
    listen 80;
    server_name sensei.example.com;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name sensei.example.com;

    ssl_certificate     /etc/letsencrypt/live/sensei.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sensei.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    # Streaming: SSE (/api/chat/stream), the gateway (/v1), and the chat
    # WebSocket — disable proxy buffering so output is not held back.
    location ~ ^/(v1|api/chat/stream|api/chat/ws) {
        proxy_pass http://sensei;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;     # WebSocket
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://sensei;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}
