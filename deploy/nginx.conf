# Sensei VPS Deployment — Nginx + Docker Compose
#
# This config serves the Sensei public chat app at senseiissei.dev
# and the dev panel at senseiissei.dev/devpanel
#
# Architecture:
#   - Nginx (port 80/443) → reverse proxy
#   - Frontend (static files, built with vite)
#   - Backend (FastAPI on port 7000)
#
# The frontend uses HashRouter, so:
#   - /          → public chat (requires login)
#   - /#/devpanel → secret admin panel
#   - /#/auth    → login/register page

server {
    listen 80;
    server_name senseiissei.dev www.senseiissei.dev;

    # Redirect to HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # Frontend static files
    root /opt/sensei/frontend/dist;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for chat streaming
    location /api/chat/ws {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:7000;
    }

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1000;
}
