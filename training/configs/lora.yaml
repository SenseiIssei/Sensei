# Sensei-1 LoRA Training Config
model:
  base_model: "THUDM/glm-5.2-744b"
  trust_remote_code: true
  torch_dtype: "bfloat16"

lora:
  r: 64
  lora_alpha: 128
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./lora_output"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  max_seq_length: 8192
  optim: "adamw_torch"
  weight_decay: 0.0
  max_grad_norm: 1.0

data:
  train_file: "training_data.jsonl"
  eval_file: "eval_data.jsonl"
  compression_aware: true
  ccr_examples_ratio: 0.2

wandb:
  project: "sensei-1"
  run_name: "lora-v0.1"
