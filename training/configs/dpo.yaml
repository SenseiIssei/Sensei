# Sensei-1 DPO Alignment Config
model:
  base_model: "./qlora_output/merged"
  trust_remote_code: true
  torch_dtype: "bfloat16"

dpo:
  beta: 0.1
  loss_type: "sigmoid"

training:
  output_dir: "./dpo_output"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 5.0e-6
  warmup_ratio: 0.1
  lr_scheduler_type: "linear"
  logging_steps: 10
  save_strategy: "epoch"
  bf16: true
  gradient_checkpointing: true
  max_length: 4096
  max_prompt_length: 2048
  beta: 0.1

data:
  train_file: "preference_data.jsonl"
  eval_file: "preference_eval.jsonl"

wandb:
  project: "sensei-1"
  run_name: "dpo-v0.1"
